<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>String Operations</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body>

    <header class="text-primary text-center display-4 mt-3">
      STRING OPERATIONS
    </header>

    <!-- Input -->
    <div class="container text-center w-50 my-4">
      <input type="text" id="inputpara" class="form-control" placeholder="Enter paragraph here">
    </div>

    <!-- Result -->
    <div class="container text-center">
      <div class="bg-secondary text-white p-3 rounded" style="min-height: 80px;">
        <span id="result1">Result will appear here</span>
      </div>
    </div>

    <!-- Buttons -->
    <div class="container text-center w-75 mt-4">
      <div class="row g-3">

        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="countVowels()">Count Vowels</button>
        </div>

        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="longestWord()">Longest Word</button>
        </div>

        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="checkPalindrome()">Palindrome</button>
        </div>

        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="countSpaces()">Count Spaces</button>
        </div>

        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="countLines()">Count Lines</button>
        </div>

        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="toUpper()">Uppercase</button>
        </div>

        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="toLower()">Lowercase</button>
        </div>

        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="reverseText()">Reverse</button>
        </div>

      </div>
    </div>

    <!-- JS -->
    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
